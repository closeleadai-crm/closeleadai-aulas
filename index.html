<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Aulas CloseLeadAI</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="login-page">
  <div class="login-container">
    <img src="assets/logo.png" alt="CloseLeadAI" class="login-logo" />
    <h1>🔐 Acesso às Aulas CloseLeadAI</h1>
    <p>Digite sua senha para entrar:</p>
    <input type="password" id="senha" placeholder="Senha de acesso" />
    <button onclick="login()">Entrar</button>
    <p id="erro" class="erro"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
